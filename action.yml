name: 'Fetch Bookmeter'
description: 'Fetch book data from Bookmeter and save it as JSON'
author: 'kotaoue'

branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  user-id:
    description: 'Bookmeter user ID'
    required: true
    default: '104'
  output:
    description: 'Output file path for the JSON'
    required: false
    default: 'wish.json'
  type:
    description: 'Type of book list to fetch: "wish" for wish list, "read" for read books history'
    required: false
    default: 'wish'
  year:
    description: 'Filter read books by year (e.g. 2024). 0 means no filter. Only used when type is "read".'
    required: false
    default: '0'
  month:
    description: 'Filter read books by month (1-12). 0 means no filter. Only used when type is "read".'
    required: false
    default: '0'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.type == 'read' && 'fetch-read' || 'fetch-wish' }}
    - '-user-id'
    - ${{ inputs.user-id }}
    - '-output'
    - ${{ inputs.output }}
    - '-year'
    - ${{ inputs.year }}
    - '-month'
    - ${{ inputs.month }}
